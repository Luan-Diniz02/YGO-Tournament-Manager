services:
  - type: web
    name: ygo-tournament-manager
    runtime: python
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: AUTO_INIT_DB
        value: "1"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_ALLOWED_IPS
        value: ""
      - key: DB_SSL_DISABLED
        value: "0"
      - key: DB_SSL_CA
        value: ""
      - key: DB_SSL_VERIFY_CERT
        value: "0"
      - key: DB_SSL_VERIFY_IDENTITY
        value: "0"
      





